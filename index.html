<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tecnologia e Inovação</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>Tecnologia e Inovação</h1>
    <nav aria-label="Menu de navegação">
      <ul>
        <li><a href="#about">Sobre</a></li>
        <li><a href="#services">Serviços</a></li>
        <li><a href="#testimonials">Depoimentos</a></li>
        <li><a href="#contact">Contato</a></li>
      </ul>
    </nav>
    <button id="high-contrast-toggle" aria-label="Ativar Modo de Alto Contraste">Ajustar Contraste</button>
  </header>

  <main>
    <!-- About Section -->
    <section id="about" class="section-about">
      <h2>Sobre</h2>
      <p>Explore as últimas inovações tecnológicas que estão moldando o futuro.</p>
    </section>

    <!-- Services Section -->
    <section id="services" class="section-services">
      <h2>Serviços</h2>
      <div class="services-grid"></div>
    </section>

    <!-- Testimonials Section -->
    <section id="testimonials" class="section-testimonials">
      <h2>Depoimentos</h2>
      <div class="testimonials-carousel"></div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="section-contact">
      <h2>Contato</h2>
      <form aria-labelledby="contact-form">
        <label for="name">Nome:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Tecnologia e Inovação. Todos os direitos reservados.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
